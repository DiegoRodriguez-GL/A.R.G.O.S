[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "argos-cli"
version = "0.0.1"
description = "ARGOS command-line interface. Entry point for scan, redteam, proxy and report."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "ARGOS Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Environment :: Console",
  "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Typing :: Typed",
]
dependencies = [
  "argos-core",
  "argos-scanner",
  "argos-redteam",
  "argos-reporter",
  "argos-eval",
  "typer>=0.12.5",
  "rich>=13.8.1",
  "pygments>=2.20.0",  # transitive via rich; floor pinned for CVE-2026-4539
  "pyyaml>=6.0.2",  # argos_cli.config reads argos.yaml directly
]

[project.scripts]
argos = "argos_cli.__main__:main"

[project.urls]
Homepage      = "https://github.com/argos-ai-audit/argos"
Documentation = "https://argos-ai-audit.github.io/argos"
Issues        = "https://github.com/argos-ai-audit/argos/issues"
Repository    = "https://github.com/argos-ai-audit/argos"

[tool.hatch.build.targets.wheel]
packages = ["src/argos_cli"]
