[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "argos-reporter"
version = "0.0.1"
description = "ARGOS reporting engine. HTML (Jinja2) + JSONL exporters with compliance matrix."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "ARGOS Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Topic :: Text Processing :: Markup :: HTML",
  "Typing :: Typed",
]
dependencies = [
  "argos-core",
  "jinja2>=3.1.4",
  "markupsafe>=2.1.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/argos_reporter"]

[tool.hatch.build.targets.wheel.force-include]
"src/argos_reporter/html/templates" = "argos_reporter/html/templates"
"src/argos_reporter/html/static"    = "argos_reporter/html/static"
