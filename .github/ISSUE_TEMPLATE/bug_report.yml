name: Bug report
description: Something in ARGOS is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before you submit, please check
        the [security policy](../../SECURITY.md) -- if this touches confidentiality,
        integrity or availability of an audited system, disclose privately instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: "argos scan crashes when the MCP config contains..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce. A minimal example is gold.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include full stack traces or logs inside ``` fenced blocks.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ARGOS version
      placeholder: "argos --version output"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: The report does not contain secrets, PII, or customer data.
          required: true
