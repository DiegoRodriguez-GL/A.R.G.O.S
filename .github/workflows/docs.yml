name: docs

# Manual-only until Module 8 lands apps/landing (Astro) and apps/docs (MkDocs).
# Once those are populated, add a push trigger with path filters limited to
# apps/docs/** and apps/landing/**.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs + landing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Guard -- require at least one site to build
        id: guard
        run: |
          if [ ! -f apps/landing/package.json ] && [ ! -f apps/docs/mkdocs.yml ]; then
            echo "::notice::Nothing to build (landing and docs not yet populated)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false' && hashFiles('apps/landing/package-lock.json') != ''
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/landing/package-lock.json

      - name: Build landing (Astro)
        if: steps.guard.outputs.skip == 'false' && hashFiles('apps/landing/package.json') != ''
        working-directory: apps/landing
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false' && hashFiles('apps/docs/mkdocs.yml') != ''
        with:
          python-version: "3.11"

      - name: Build docs (MkDocs)
        if: steps.guard.outputs.skip == 'false' && hashFiles('apps/docs/mkdocs.yml') != ''
        working-directory: apps/docs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python]
          mkdocs build --strict --site-dir ../../dist-site/docs

      - name: Assemble site
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p dist-site
          if [ -d apps/landing/dist ]; then
            cp -R apps/landing/dist/. dist-site/
          fi
          if [ ! -f dist-site/index.html ] && [ ! -d dist-site/docs ]; then
            echo "::error::dist-site is empty; refusing to deploy a blank Pages site."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        if: steps.guard.outputs.skip == 'false'
        with:
          path: dist-site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
