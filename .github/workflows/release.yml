name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  build:
    name: build wheels
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.4.18"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras --frozen
      - name: Build every workspace package
        run: |
          mkdir -p dist
          for pkg in packages/*/; do
            uv build "${pkg}" --out-dir dist
          done
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 14

  publish:
    name: publish to PyPI (trusted publisher)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/argos-core
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
