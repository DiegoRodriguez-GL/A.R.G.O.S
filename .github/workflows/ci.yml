name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint + format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras --frozen
      - run: uv run ruff check packages scripts
      - run: uv run ruff format --check packages scripts

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras --frozen
      - run: uv run mypy packages

  test:
    name: pytest (${{ matrix.python-version }} on ${{ matrix.os }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.18"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --frozen
      - name: Build design tokens
        run: uv run python scripts/build_tokens.py
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  tokens:
    name: design tokens are up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate and diff
        run: |
          python scripts/build_tokens.py
          if ! git diff --quiet -- design-system/tokens.css design-system/tokens.py design-system/tokens.ts; then
            echo "::error::tokens.{css,py,ts} are out of sync with tokens.json. Run 'make tokens' and commit."
            git --no-pager diff -- design-system/tokens.css design-system/tokens.py design-system/tokens.ts
            exit 1
          fi
